<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<title>游戏沙盒导航</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
			background: #050508;
			color: #e8eaed;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			padding: 24px;
		}
		h1 {
			font-size: 32px;
			font-weight: 600;
			margin-bottom: 8px;
			letter-spacing: 2px;
			text-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
		}
		.subtitle {
			color: #9aa0a6;
			font-size: 14px;
			margin-bottom: 48px;
		}
		.nav-grid {
			display: grid;
			grid-template-columns: 1fr;
			gap: 24px;
			width: 100%;
			max-width: 420px;
		}
		@media (min-width: 640px) {
			.nav-grid {
				grid-template-columns: repeat(2, 1fr);
				max-width: 760px;
			}
		}
		.nav-card {
			display: block;
			text-decoration: none;
			background: #0a0a10;
			border: 1px solid #2c2f36;
			border-radius: 16px;
			padding: 32px;
			transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
		}
		.nav-card:hover {
			transform: translateY(-4px);
			border-color: #00ffff;
			box-shadow: 0 12px 32px rgba(0, 255, 255, 0.15);
		}
		.nav-card .icon {
			font-size: 40px;
			margin-bottom: 16px;
		}
		.nav-card .title {
			font-size: 20px;
			font-weight: 500;
			color: #e8eaed;
			margin-bottom: 8px;
		}
		.nav-card .desc {
			font-size: 13px;
			color: #9aa0a6;
			line-height: 1.5;
		}
		.badge {
			display: inline-block;
			font-size: 11px;
			padding: 3px 10px;
			border-radius: 999px;
			background: #1a2a2a;
			color: #00ffff;
			margin-top: 14px;
			border: 1px solid rgba(0, 255, 255, 0.3);
		}
		.badge.wip {
			background: #2a1a1a;
			color: #ffaa00;
			border-color: rgba(255, 170, 0, 0.3);
		}
	</style>
</head>
<body>
	<h1>🎮 NEW FIGHT</h1>
	<p class="subtitle">选择下方的游戏模块进入对应页面</p>

	<div class="nav-grid">
		<a href="./pages/fighter.html" class="nav-card">
			<div class="icon">🥊</div>
			<div class="title">霓虹贫民窟</div>
			<div class="desc">3D 格斗对战 · 连招系统 · 赛博黑街风格 · 实时战斗</div>
			<span class="badge">可玩</span>
		</a>

		<a href="./pages/tank.html" class="nav-card">
			<div class="icon">🎮</div>
			<div class="title">3D 坦克大战</div>
			<div class="desc">局域网联机 · 多人对战 · 经典重制 · 敬请期待</div>
			<span class="badge wip">开发中</span>
		</a>
	</div>
</body>
</html>
