<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebGPU Ultimate Fighter: Neon Core 2.1</title>
    <style>
        /* ================= UI 样式系统 ================= */
        :root { --c-neon: #00ffff; --c-pink: #ff00ff; --c-bg: #050510; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--c-bg); overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; font-family: 'Arial Black', Impact, sans-serif; }
        
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background-color: var(--c-bg); }
        
        .top-bar { position: absolute; top: 15px; width: 100%; display: flex; justify-content: center; z-index: 100; pointer-events: none; }
        #btn-fs { pointer-events: auto; background: rgba(0, 255, 255, 0.1); border: 1px solid var(--c-neon); color: var(--c-neon); padding: 8px 25px; border-radius: 20px; font-size: 14px; cursor: pointer; text-shadow: 0 0 5px var(--c-neon); backdrop-filter: blur(4px); transition: 0.3s; text-transform: uppercase; }
        #btn-fs:hover { background: var(--c-neon); color: #000; box-shadow: 0 0 15px var(--c-neon); }

        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(20,0,30,0.85) 0%, rgba(5,5,10,0.98) 100%); z-index: 50; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .logo { font-size: 60px; font-style: italic; color: #fff; text-shadow: 0 0 15px var(--c-pink), 4px 4px 0px #505; margin-bottom: 40px; letter-spacing: 5px; animation: glitch 2s infinite; text-align: center; }
        .roster { display: flex; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; }
        .char-card { width: 130px; padding: 20px 10px; background: rgba(255,255,255,0.05); border: 2px solid #333; text-align: center; color: #888; border-radius: 12px; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); position: relative; overflow: hidden; box-sizing: border-box; }
        .char-card.active { border-color: var(--c-neon); color: #fff; box-shadow: 0 0 25px rgba(0,255,255,0.4), inset 0 0 15px rgba(0,255,255,0.2); transform: translateY(-10px) scale(1.05); }
        .char-icon { width: 70px; height: 70px; margin: 0 auto 15px; border-radius: 8px; border: 2px solid #555; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
        .char-stats { font-size: 11px; text-align: left; margin-top: 15px; display: none; line-height: 1.4; }
        .char-card.active .char-stats { display: block; color: var(--c-neon); }
        .btn-start { padding: 15px 60px; font-size: 28px; color: #000; background: var(--c-neon); border: none; border-radius: 6px; cursor: pointer; text-transform: uppercase; font-weight: 900; box-shadow: 0 0 20px var(--c-neon); transition: 0.2s; }
        .btn-start:active { transform: scale(0.92); box-shadow: 0 0 10px var(--c-neon); }

        @keyframes glitch { 0% { text-shadow: 2px 0 var(--c-neon), -2px 0 var(--c-pink); } 50% { text-shadow: -2px 0 var(--c-neon), 2px 0 var(--c-pink); } 100% { text-shadow: 2px 0 var(--c-neon), -2px 0 var(--c-pink); } }

        /* HUD Layer */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        .hud { display: flex; justify-content: space-between; padding: 20px 40px; width: 100%; box-sizing: border-box; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .player-info { width: 42%; }
        .p-name { color: #fff; font-size: 22px; text-shadow: 2px 2px 0 #000, 0 0 8px var(--c-neon); margin-bottom: 8px; font-style: italic; letter-spacing: 2px; }
        .enemy-info .p-name { text-align: right; text-shadow: 2px 2px 0 #000, 0 0 8px var(--c-pink); color: #fff; }
        .hp-bar { width: 100%; height: 30px; background: rgba(30,30,30,0.8); border: 2px solid #fff; transform: skewX(-20deg); box-shadow: 5px 5px 0 rgba(0,0,0,0.6); position: relative; overflow: hidden; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #0f0, #dfd); width: 100%; transition: width 0.15s ease-out; box-shadow: 0 0 10px #0f0; }
        .enemy-info .hp-fill { background: linear-gradient(90deg, #f00, #f88); float: right; box-shadow: 0 0 10px #f00; }
        .combo-counter { position: absolute; top: 90px; left: 40px; font-size: 45px; color: #ff0; text-shadow: 4px 4px 0 #f00, 0 0 15px #ffaa00; opacity: 0; transition: opacity 0.2s; font-style: italic; transform: skewX(-10deg); }

        /* 触控映射区 */
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 160px; height: 160px; background: radial-gradient(circle, rgba(0,255,255,0.15) 0%, transparent 70%); border: 2px solid rgba(0,255,255,0.4); border-radius: 50%; pointer-events: auto; touch-action: none; }
        #joystick-knob { position: absolute; top: 55px; left: 55px; width: 50px; height: 50px; background: rgba(255,255,255,0.9); border-radius: 50%; box-shadow: 0 0 15px var(--c-neon); pointer-events: none; transition: transform 0.05s linear; }
        .btn-group { position: absolute; bottom: 30px; right: 40px; width: 220px; height: 220px; pointer-events: auto; touch-action: none; }
        .btn-act { position: absolute; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; color: #fff; text-shadow: 1px 1px 0 #000; box-shadow: inset 0 0 20px rgba(255,255,255,0.4), 0 5px 15px rgba(0,0,0,0.6); border: 2px solid #fff; user-select: none; }
        .btn-act:active { transform: scale(0.9) translateY(5px); box-shadow: inset 0 0 30px rgba(255,255,255,0.9); }
        #btn-a { bottom: 0; left: 0; background: var(--c-pink); } 
        #btn-b { bottom: 95px; left: 95px; background: #888; } 
        #btn-c { bottom: 0; left: 130px; background: #0f0; } 
        #btn-s { bottom: 130px; left: 0; background: var(--c-neon); color: #000; text-shadow: none; } 

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 200; pointer-events: auto; backdrop-filter: blur(5px); }
        .overlay-msg { font-size: 80px; color: #ffaa00; text-shadow: 5px 5px 0 #f00, 0 0 30px #ffaa00; letter-spacing: 8px; transform: scale(0); animation: stamp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; margin-bottom: 30px; font-style: italic; }
        @keyframes stamp { to { transform: scale(1); } }
    </style>
    <script type="importmap"> { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.webgpu.js", "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.webgpu.js" } } </script>
</head>
<body>
    <div class="top-bar"><button id="btn-fs">Fullscreen</button></div>
    <div id="canvas-container"></div>

    <div id="start-screen">
        <div class="logo">NEON CORE : 2.1</div>
        <div class="roster">
            <div class="char-card active" data-type="0">
                <div class="char-icon" style="background: linear-gradient(135deg, #00f, #fff);"></div>
                <h3>BRAWLER</h3>
                <div class="char-stats">SPD: ★★★☆☆<br>ATK: ★★★☆☆<br>RNG: ★★☆☆☆<br><br>Balanced Fighter</div>
            </div>
            <div class="char-card" data-type="1">
                <div class="char-icon" style="background: linear-gradient(135deg, #f00, #222);"></div>
                <h3>HEAVY BOXER</h3>
                <div class="char-stats">SPD: ★★☆☆☆<br>ATK: ★★★★★<br>RNG: ★☆☆☆☆<br><br>Close Combat</div>
            </div>
            <div class="char-card" data-type="2">
                <div class="char-icon" style="background: linear-gradient(135deg, #555, #0ff);"></div>
                <h3>CYBER RONIN</h3>
                <div class="char-stats">SPD: ★★★★☆<br>ATK: ★★★☆☆<br>RNG: ★★★★★<br><br>Sword Master</div>
            </div>
        </div>
        <button class="btn-start" id="start-btn">ENGAGE</button>
    </div>

    <div id="ui-layer">
        <div class="hud">
            <div class="player-info">
                <div class="p-name">P1[ <span id="p1-name"></span> ]</div>
                <div class="hp-bar"><div id="hp-player" class="hp-fill"></div></div>
            </div>
            <div class="player-info enemy-info">
                <div class="p-name">AI ENEMY</div>
                <div class="hp-bar"><div id="hp-enemy" class="hp-fill"></div></div>
            </div>
        </div>
        <div id="combo-txt" class="combo-counter">2 HITS!</div>
        
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        <div class="btn-group">
            <div id="btn-a" class="btn-act">ATK</div>
            <div id="btn-b" class="btn-act">JMP</div>
            <div id="btn-c" class="btn-act">DASH</div>
            <div id="btn-s" class="btn-act">SKL</div>
        </div>
    </div>

    <div id="overlay">
        <div id="overlay-txt" class="overlay-msg">KO!</div>
        <button class="btn-start" id="restart-btn" style="font-size:24px; padding:15px 40px;">RESELECT</button>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // 核心参数
        const CFG = { g: -60, floorY: 0, camZ: 26, camY: 6.0, dodgeSpeed: 28 };
        const ST = { IDLE:0, WALK:1, JUMP:2, FALL:3, ATK1:4, ATK2:5, ATK3:6, DASH:7, SKILL:8, BLOCK:9, HURT:10, DEAD:11, WIN:12 };
        const haptic = (ms) => { if (navigator.vibrate) navigator.vibrate(ms); };

        // [1] 音频引擎
        class AudioEngine {
            constructor() { this.ctx = null; this.master = null; }
            init() {
                if (this.ctx && this.ctx.state === 'running') return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.master = this.ctx.createGain();
                this.master.gain.value = 0.4;
                this.master.connect(this.ctx.destination);
                this.startBGM(); 
            }
            play(freq, type, dur, vol, slide=null) {
                if(!this.ctx || this.ctx.state !== 'running') return;
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.type = type; osc.connect(gain); gain.connect(this.master);
                osc.frequency.setValueAtTime(freq, t);
                if(slide) osc.frequency.exponentialRampToValueAtTime(slide, t + dur);
                gain.gain.setValueAtTime(vol, t); 
                gain.gain.exponentialRampToValueAtTime(0.01, t + dur);
                osc.start(t); osc.stop(t + dur);
            }
            sfxHitLight() { this.play(250, 'square', 0.1, 0.4, 50); haptic(20); }
            sfxHitHeavy() { this.play(120, 'sawtooth', 0.25, 0.7, 10); haptic(50); }
            sfxBlock() { this.play(800, 'sine', 0.1, 0.5, 1200); haptic(10); }
            sfxSwing() { this.play(180, 'sine', 0.15, 0.3, 80); }
            sfxSlash() { this.play(900, 'sawtooth', 0.1, 0.2, 300); }
            sfxDash() { this.play(100, 'sawtooth', 0.2, 0.2, 20); }
            sfxShoot() { this.play(600, 'square', 0.3, 0.4, 100); }
            sfxKO() { this.play(80, 'sawtooth', 2.5, 0.9, 10); haptic(200); }
            
            startBGM() {
                let tempo = 110; let beat = 60/tempo; let nextBeat = this.ctx.currentTime + 0.1;
                const tick = () => {
                    if (!this.ctx) return;
                    while(nextBeat < this.ctx.currentTime + 0.1) {
                        let step = Math.round(nextBeat / beat) % 4;
                        if(step === 0 || step === 2) this.play(50, 'sine', 0.2, 0.5, 10);
                        if(step === 1 || step === 3) this.play(200, 'square', 0.1, 0.15, 10);
                        nextBeat += beat;
                    }
                    requestAnimationFrame(tick);
                };
                tick();
            }
        }
        const audio = new AudioEngine();

        // [2] 特效系统 (GC)
        class VFXEngine {
            constructor(scene) {
                this.scene = scene;
                this.particles =[]; this.texts = []; this.trails =[];
                this.fontCanvas = document.createElement('canvas');
                this.fontCtx = this.fontCanvas.getContext('2d', { willReadFrequently: true });
                this.boxGeom = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            }
            spawnSparks(pos, color, count=15) {
                const mat = new THREE.MeshBasicMaterial({ color: color });
                for(let i=0; i<count; i++) {
                    const m = new THREE.Mesh(this.boxGeom, mat); m.position.copy(pos);
                    this.scene.add(m);
                    this.particles.push({ m, life: 1.0, vx:(Math.random()-0.5)*30, vy:Math.random()*25+10, vz:(Math.random()-0.5)*30, mat });
                }
            }
            spawnTrail(mesh, color) {
                const clone = new THREE.Mesh(mesh.geometry, new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending }));
                mesh.getWorldPosition(clone.position); mesh.getWorldQuaternion(clone.quaternion); clone.scale.copy(mesh.scale);
                this.scene.add(clone);
                this.trails.push({ m: clone, life: 0.25 });
            }
            spawnText(pos, txt, color="#ff0000", isCrit=false) {
                this.fontCanvas.width = 256; this.fontCanvas.height = 128;
                this.fontCtx.clearRect(0,0,256,128);
                this.fontCtx.fillStyle = color; this.fontCtx.font = `900 ${isCrit?60:45}px Impact`;
                this.fontCtx.textAlign = "center"; this.fontCtx.shadowColor = isCrit ? "#fff" : "#000"; this.fontCtx.shadowBlur = isCrit ? 10 : 5;
                this.fontCtx.fillText(txt, 128, 80);
                const tex = new THREE.CanvasTexture(this.fontCanvas);
                const mat = new THREE.SpriteMaterial({ map: tex });
                const sprite = new THREE.Sprite(mat);
                sprite.position.copy(pos); sprite.position.y += 2.5 + Math.random(); sprite.position.x += (Math.random()-0.5);
                sprite.scale.set(5, 2.5, 1);
                this.scene.add(sprite);
                this.texts.push({ m: sprite, life: 1.2, vy: 4, mat, tex });
            }
            update(dt) {
                for (let i = this.particles.length-1; i>=0; i--) {
                    let p = this.particles[i]; p.life -= dt * 2.5;
                    if(p.life <= 0){ this.scene.remove(p.m); if(i === 0 || p.mat !== this.particles[i-1]?.mat) p.mat.dispose(); this.particles.splice(i,1); } 
                    else { p.vy += CFG.g * dt; p.m.position.set(p.m.position.x + p.vx*dt, p.m.position.y + p.vy*dt, p.m.position.z + p.vz*dt); p.m.scale.setScalar(p.life); }
                }
                for (let i = this.texts.length-1; i>=0; i--) {
                    let t = this.texts[i]; t.life -= dt;
                    if(t.life <= 0){ this.scene.remove(t.m); t.tex.dispose(); t.mat.dispose(); this.texts.splice(i,1); } 
                    else { t.m.position.y += t.vy * dt; t.m.material.opacity = t.life; }
                }
                for (let i = this.trails.length-1; i>=0; i--) {
                    let t = this.trails[i]; t.life -= dt;
                    if(t.life <= 0){ this.scene.remove(t.m); t.m.material.dispose(); this.trails.splice(i,1); } 
                    else { t.m.material.opacity = (t.life / 0.25) * 0.6; t.m.scale.multiplyScalar(0.85); }
                }
            }
        }

        // [3] 场景生成器
        function buildEnvironment(scene) {
            scene.background = new THREE.Color(0x0a0515); scene.fog = new THREE.FogExp2(0x0a0515, 0.015);
            const sunLight = new THREE.DirectionalLight(0xff00aa, 2); sunLight.position.set(-20, 20, -10); scene.add(sunLight);
            const rimLight = new THREE.DirectionalLight(0x00ffff, 3); rimLight.position.set(20, 10, 10); scene.add(rimLight);
            scene.add(new THREE.AmbientLight(0x221144, 2.5));

            const floor = new THREE.Mesh(new THREE.PlaneGeometry(120, 50), new THREE.MeshStandardMaterial({ color: 0x050510, roughness: 0.1, metalness: 0.9 }));
            floor.rotation.x = -Math.PI/2; scene.add(floor);
            const grid = new THREE.GridHelper(120, 60, 0xff00ff, 0x0055ff); grid.position.y = 0.05; scene.add(grid);

            const mtnGeom = new THREE.PlaneGeometry(250, 60, 64, 16);
            const pos = mtnGeom.attributes.position;
            for(let i=0; i<pos.count; i++) {
                const px = pos.getX(i), py = pos.getY(i);
                let z = Math.abs(Math.sin(px * 0.05) * 12) + Math.cos(px * 0.1)*6; if(py > 0) z = 0; pos.setZ(i, z * (py/30));
            }
            mtnGeom.computeVertexNormals();
            const mountains = new THREE.Mesh(mtnGeom, new THREE.MeshBasicMaterial({ color: 0x8800ff, wireframe: true, transparent: true, opacity: 0.4 }));
            mountains.rotation.x = -Math.PI/2; mountains.position.set(0, 0, -35); scene.add(mountains);

            const scCanvas = document.createElement('canvas'); scCanvas.width=512; scCanvas.height=512; const scCtx = scCanvas.getContext('2d');
            let grad = scCtx.createLinearGradient(0,0,0,512); grad.addColorStop(0,"#ffaa00"); grad.addColorStop(1,"#ff00ff");
            scCtx.fillStyle = grad; scCtx.beginPath(); scCtx.arc(256,256,250,0,Math.PI*2); scCtx.fill();
            scCtx.globalCompositeOperation = 'destination-out'; for(let i=0; i<12; i++) scCtx.fillRect(0, 300 + i*22, 512, 6 + i*1.5);
            const sunBg = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(scCanvas), transparent: true, fog: false }));
            sunBg.position.set(0, 35, -55); scene.add(sunBg);

            const city = new THREE.InstancedMesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshLambertMaterial({ color: 0x111122, emissive: 0x00ffff, emissiveIntensity: 0.15 }), 80);
            const mat4 = new THREE.Matrix4();
            for(let i=0; i<80; i++) {
                let w = 2 + Math.random()*5, h = 10 + Math.random()*30, d = 2 + Math.random()*5, x = (Math.random()-0.5)*160, z = -18 - Math.random()*20;
                mat4.makeTranslation(x, h/2, z); mat4.scale(new THREE.Vector3(w,h,d)); city.setMatrixAt(i, mat4);
            }
            scene.add(city);
        }

        // [4] 实体系统 (带真实 Box3 判断)
        class Character {
            constructor(isPlayer, typeID) {
                this.isP = isPlayer; this.type = typeID;
                this.hp = 100; this.maxHp = 100;
                this.pos = new THREE.Vector3(isPlayer ? -6 : 6, CFG.floorY, 0);
                this.vel = new THREE.Vector3(0,0,0);
                this.face = isPlayer ? 1 : -1;
                this.state = ST.IDLE; this.stTimer = 0;
                this.combo = 0; this.comboTimer = 0;
                this.hitConnected = false; this.isInvincible = false;
                
                this.stats = { spd: [15, 11, 18][typeID], jmp:[22, 18, 25][typeID], atkRanges: [[2.2, 2.2],[1.8, 1.8], [3.5, 4.0]][typeID], dmgMuls: [1.0, 1.6, 1.2][typeID] };
                this._buildRig();
            }

            _buildRig() {
                this.root = new THREE.Group(); const skinColor = 0xffccaa;
                const makeNode = (p) => { const g = new THREE.Group(); g.position.copy(p); return g; };
                const makeBox = (p, w,h,d, col, offY=0) => { const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshLambertMaterial({color:col})); m.position.set(0, offY, 0); m.castShadow = m.receiveShadow = true; p.add(m); return m; };

                this.body = makeNode(new THREE.Vector3(0, 1.5, 0)); this.root.add(this.body);
                this.head = makeNode(new THREE.Vector3(0, 0.8, 0)); this.body.add(this.head); makeBox(this.head, 0.6,0.6,0.6, skinColor, 0.3);
                this.armL = makeNode(new THREE.Vector3(-0.7, 0.6, 0)); this.body.add(this.armL);
                this.armR = makeNode(new THREE.Vector3(0.7, 0.6, 0)); this.body.add(this.armR);
                this.legL = makeNode(new THREE.Vector3(-0.3, -0.7, 0)); this.body.add(this.legL);
                this.legR = makeNode(new THREE.Vector3(0.3, -0.7, 0)); this.body.add(this.legR);

                if(this.type === 0) {
                    makeBox(this.body, 1.0, 1.4, 0.6, 0x0055ff); makeBox(this.head, 0.65, 0.1, 0.65, 0xffffff, 0.5);
                    makeBox(this.armL, 0.35, 1.1, 0.35, skinColor, -0.5); makeBox(this.armR, 0.35, 1.1, 0.35, skinColor, -0.5);
                    makeBox(this.legL, 0.4, 1.2, 0.4, 0x333333, -0.6); makeBox(this.legR, 0.4, 1.2, 0.4, 0x333333, -0.6);
                } else if(this.type === 1) {
                    makeBox(this.body, 1.3, 1.3, 0.8, skinColor); makeBox(this.body, 1.35, 0.4, 0.85, 0x111111, -0.5);
                    makeBox(this.armL, 0.4, 0.8, 0.4, skinColor, -0.4); makeBox(this.armR, 0.4, 0.8, 0.4, skinColor, -0.4);
                    makeBox(this.armL, 0.7, 0.7, 0.7, 0xff0000, -1.0); makeBox(this.armR, 0.7, 0.7, 0.7, 0xff0000, -1.0);
                } else {
                    makeBox(this.body, 0.9, 1.4, 0.5, 0x556677); makeBox(this.head, 1.5, 0.1, 1.5, 0x998866, 0.6);
                    makeBox(this.armL, 0.3, 1.1, 0.3, 0x334455, -0.5); makeBox(this.armR, 0.3, 1.1, 0.3, 0x334455, -0.5);
                    makeBox(this.legL, 0.4, 1.1, 0.4, 0x222222, -0.5); makeBox(this.legR, 0.4, 1.1, 0.4, 0x222222, -0.5);
                    this.weapon = makeBox(this.armR, 0.1, 3.0, 0.2, 0x00ffff, -1.8); this.weapon.rotation.x = Math.PI/4;
                }
                this.mats =[]; this.root.traverse(c => { if(c.isMesh) this.mats.push(c.material); });
            }

            getHurtBox() {
                return new THREE.Box3(new THREE.Vector3(this.pos.x - 0.7, this.pos.y, -1.0), new THREE.Vector3(this.pos.x + 0.7, this.pos.y + 2.8, 1.0));
            }
            getHitBox(isHeavy) {
                const w = this.stats.atkRanges[isHeavy?1:0];
                return new THREE.Box3(new THREE.Vector3(this.face>0?this.pos.x:this.pos.x-w, this.pos.y+0.5, -1.5), new THREE.Vector3(this.face>0?this.pos.x+w:this.pos.x, this.pos.y+2.5, 1.5));
            }

            changeState(st) {
                if([ST.DEAD, ST.WIN].includes(this.state)) return;
                this.state = st; this.stTimer = 0; this.hitConnected = false; this.isInvincible = false;
                
                this.body.rotation.set(0,0,0); this.head.rotation.set(0,0,0);
                this.armL.rotation.set(0,0,0); this.armR.rotation.set(0,0,0);
                this.legL.rotation.set(0,0,0); this.legR.rotation.set(0,0,0);
                this.mats.forEach(m => { m.opacity=1; m.transparent=false; });

                if(st === ST.DASH) { this.isInvincible = true; this.vel.x = this.face * CFG.dodgeSpeed; this.vel.y = 0; this.mats.forEach(m=>{m.opacity=0.4; m.transparent=true;}); }
                if(st === ST.BLOCK || st === ST.SKILL) { this.vel.x = 0; }
            }

            takeDamage(dmg, dirX, isHeavy, vfx) {
                if(this.isInvincible || this.state === ST.DEAD) return false;
                if(this.state === ST.BLOCK && dirX !== this.face) {
                    this.hp -= dmg * 0.1; vfx.spawnSparks(new THREE.Vector3(this.pos.x + this.face, this.pos.y+1.5, 0), 0x00ffff, 8);
                    audio.sfxBlock(); this.vel.x = dirX * 5; return true;
                }
                this.hp -= dmg; audio[isHeavy?'sfxHitHeavy':'sfxHitLight']();
                vfx.spawnSparks(new THREE.Vector3(this.pos.x, this.pos.y+1.5, 0), isHeavy?0xff00ff:0xffaa00, isHeavy?25:12);
                vfx.spawnText(new THREE.Vector3(this.pos.x, this.pos.y+2, 0), Math.floor(dmg), isHeavy?"#ff00ff":"#ffaa00", isHeavy);

                this.vel.x = dirX * (isHeavy ? 18 : 8); this.vel.y = isHeavy ? 12 : 3;
                this.mats.forEach(m => m.emissive.setHex(0xffffff)); setTimeout(() => { if(this.mats) this.mats.forEach(m => m.emissive.setHex(0x000000)); }, 80);
                if(this.hp <= 0) { this.hp = 0; this.changeState(ST.DEAD); } else this.changeState(ST.HURT);
                return true;
            }

            update(dt, opp, vfx, scene) {
                if(this.state === ST.DEAD || this.state === ST.WIN) { this._animate(dt); this.root.position.copy(this.pos); return; }

                this.stTimer += dt;
                if(this.comboTimer > 0) this.comboTimer -= dt; else this.combo = 0;
                let onGnd = this.pos.y <= CFG.floorY;

                if(!onGnd) this.vel.y += CFG.g * dt;
                else if(this.vel.y < 0) { this.vel.y = 0; this.pos.y = CFG.floorY; if([ST.FALL, ST.HURT].includes(this.state)) this.changeState(ST.IDLE); }
                if(onGnd && ![ST.WALK, ST.DASH].includes(this.state)) this.vel.x *= 0.6;
                
                if([ST.ATK1, ST.ATK2, ST.ATK3].includes(this.state)) {
                    let isHeavy = this.state === ST.ATK3;
                    if(onGnd && this.stTimer < 0.1) this.vel.x = this.face * (isHeavy?10:4);
                    if(this.stTimer >= (isHeavy?0.25:0.1) && this.stTimer <= (isHeavy?0.4:0.2)) {
                        if(this.type === 2 && this.stTimer < (isHeavy?0.25:0.1)+0.05) vfx.spawnTrail(this.weapon, 0x00ffff);
                        if(!this.hitConnected) {
                            if(this.getHitBox(isHeavy).intersectsBox(opp.getHurtBox())) {
                                if(opp.takeDamage((isHeavy?18:8) * this.stats.dmgMuls, this.face, isHeavy, vfx)) {
                                    this.hitConnected = true;
                                    if(this.isP) { this.combo++; this.comboTimer = 2.0; let cTxt = document.getElementById('combo-txt'); if(this.combo > 1) { cTxt.innerText = `${this.combo} HITS!`; cTxt.style.opacity = 1; setTimeout(()=>cTxt.style.opacity=0, 1500); } }
                                    window.gameHitStop = isHeavy ? 0.18 : 0.08; window.gameCamShake = isHeavy ? 1.0 : 0.4;
                                }
                            }
                        }
                    }
                    if(this.stTimer > (isHeavy?0.7:0.35)) this.changeState(ST.IDLE);
                }

                if(this.state === ST.DASH && this.stTimer > 0.35) this.changeState(ST.IDLE);
                if(this.state === ST.HURT && this.stTimer > 0.45 && onGnd) this.changeState(ST.IDLE);
                if(this.state === ST.SKILL) {
                    if(this.stTimer > 0.2 && !this.hitConnected) {
                        this.hitConnected = true; audio.sfxShoot();
                        const projMat = new THREE.MeshBasicMaterial({ color: this.type===1?0xff0000:0x00ffff, wireframe: true });
                        const proj = new THREE.Mesh(new THREE.IcosahedronGeometry(0.8, 1), projMat);
                        proj.position.set(this.pos.x + this.face*2, this.pos.y + 1.5, 0); scene.add(proj);
                        window.sysProjectiles.push({ m: proj, vx: this.face * 35, owner: this, life: 1.5, mat: projMat });
                    }
                    if(this.stTimer > 0.6) this.changeState(ST.IDLE);
                }

                this.pos.addScaledVector(this.vel, dt);
                this.pos.x = Math.max(-20, Math.min(20, this.pos.x));
                if(opp.state !== ST.DEAD && this.state !== ST.DASH && opp.state !== ST.DASH) {
                    let d = opp.pos.x - this.pos.x;
                    if(Math.abs(d) < 1.4 && this.pos.y < opp.pos.y + 2.5) this.pos.x = opp.pos.x - Math.sign(d)*1.4;
                }

                this.root.position.copy(this.pos);
                this.root.rotation.y = THREE.MathUtils.lerp(this.root.rotation.y, this.face>0 ? Math.PI/2 : -Math.PI/2, 0.3);
                this._animate(dt);
            }

            // [重构核心修复] 所有的向前出招，X轴旋转必须为负数！
            _animate(dt) {
                const t = this.stTimer; const pi = Math.PI;
                switch(this.state) {
                    case ST.IDLE:
                        this.body.position.y = 1.5 + Math.sin(t*5)*0.06;
                        this.armL.rotation.x = Math.sin(t*2)*0.1; this.armR.rotation.x = this.type===2 ? 0.5 : Math.sin(t*2+pi)*0.1;
                        break;
                    case ST.WALK:
                        this.body.position.y = 1.5 + Math.abs(Math.sin(t*18))*0.15;
                        this.armL.rotation.x = Math.sin(t*15)*1.2; this.armR.rotation.x = this.type===2 ? 0.5 : -Math.sin(t*15)*1.2;
                        this.legL.rotation.x = -Math.sin(t*15)*1.2; this.legR.rotation.x = Math.sin(t*15)*1.2;
                        break;
                    case ST.JUMP: case ST.FALL:
                        this.legL.rotation.x = 0.5; this.legR.rotation.x = -0.2;
                        this.armL.rotation.x = 0.8; this.armR.rotation.x = -0.8;
                        break;
                    case ST.ATK1: case ST.ATK2: 
                        let isLeft = this.state === ST.ATK1; let arm = isLeft ? this.armL : this.armR;
                        if(this.type === 2) { 
                            if(t<0.1) { this.armR.rotation.x = -t*30; this.body.rotation.x = 0.3; } // 向前砍
                            else { this.armR.rotation.x = THREE.MathUtils.lerp(this.armR.rotation.x, 0, 0.2); this.body.rotation.x = 0; }
                        } else { 
                            if(t<0.1) { arm.rotation.x = -t*25; this.body.rotation.y = isLeft?0.6:-0.6; } // 向前出拳
                            else { arm.rotation.x = THREE.MathUtils.lerp(arm.rotation.x, 0, 0.3); this.body.rotation.y = 0; }
                        }
                        break;
                    case ST.ATK3: 
                        if(this.type === 2) { // 浪人：大回环前劈
                            if(t<0.2) { this.armR.rotation.x = 2.5; this.body.rotation.x = -0.4; } // 蓄力手朝后
                            else if(t<0.3) { this.armR.rotation.x = -2.8; this.body.rotation.x = 0.6; } // 发力手朝前
                            else { this.armR.rotation.x = THREE.MathUtils.lerp(this.armR.rotation.x, 0, 0.1); this.body.rotation.x = 0; }
                        } else { // 拳手：升龙爆捶
                            if(t<0.2) { this.armR.rotation.x = 1.0; this.body.position.y = 1.0; } // 蓄力
                            else if(t<0.3) { this.armR.rotation.x = -3.5; this.body.position.y = 2.2; } // 向前上方爆锤
                            else { this.armR.rotation.x = THREE.MathUtils.lerp(this.armR.rotation.x, 0, 0.1); this.body.position.y = 1.5; }
                        }
                        break;
                    case ST.BLOCK:
                        this.armL.rotation.x = -1.8; this.armR.rotation.x = -1.8;
                        this.armL.rotation.z = 0.6; this.armR.rotation.z = -0.6;
                        this.body.rotation.x = 0.3;
                        break;
                    case ST.DASH:
                        this.body.rotation.x = 0.7; this.armL.rotation.x = 1.2; this.armR.rotation.x = 1.2; this.head.rotation.x = -0.6;
                        break;
                    case ST.SKILL:
                        if(t<0.2) { this.armL.rotation.x = 2.5; this.armR.rotation.x = 2.5; } // 双臂后摆蓄气
                        else { this.armL.rotation.x = -1.5; this.armR.rotation.x = -1.5; } // 向前推出发波
                        break;
                    case ST.HURT:
                        this.body.rotation.x = -0.8; this.head.rotation.x = 0.5; this.armL.rotation.x = -0.5; this.armR.rotation.x = -0.5;
                        break;
                    case ST.DEAD:
                        this.body.rotation.x = -pi/2; this.body.position.y = 0.6; this.legL.rotation.x = 0; this.legR.rotation.x = 0;
                        break;
                    case ST.WIN:
                        this.body.rotation.x = 0; this.armL.rotation.z = 3.0; this.armR.rotation.z = -3.0; this.head.rotation.x = Math.sin(t*12)*0.15;
                        break;
                }
            }
        }

        // [5] 智能行为树 (已解开状态死锁限制)
        class AIController {
            constructor() { this.thinkTimer = 0; }
            update(dt, ai, opp) {
                if(ai.state === ST.DEAD || opp.state === ST.DEAD) return;
                
                // 强制退出防御锁死
                if(ai.state === ST.BLOCK) {
                    this.thinkTimer -= dt;
                    if(this.thinkTimer <= 0) ai.changeState(ST.IDLE);
                    return;
                }

                let onGnd = ai.pos.y <= CFG.floorY;
                if(![ST.IDLE, ST.WALK].includes(ai.state)) return; // 只有空闲时才考虑起步
                
                this.thinkTimer -= dt;
                if(this.thinkTimer > 0) return;

                let dist = Math.abs(ai.pos.x - opp.pos.x);
                let isOppAttacking =[ST.ATK1, ST.ATK2, ST.ATK3, ST.SKILL].includes(opp.state);
                let atkRng = ai.stats.atkRanges[0];
                ai.face = opp.pos.x > ai.pos.x ? 1 : -1;

                if (isOppAttacking && dist < atkRng * 1.5 && onGnd) {
                    if (Math.random() < 0.4) { ai.changeState(ST.BLOCK); this.thinkTimer = 0.5; return; }
                    if (Math.random() < 0.2) { ai.changeState(ST.DASH); ai.face = -ai.face; ai.vel.x = ai.face * CFG.dodgeSpeed; this.thinkTimer = 0.5; return; }
                }

                if (dist > atkRng * 1.1) {
                    ai.vel.x = ai.face * (ai.stats.spd * 0.7);
                    if (onGnd && ai.state !== ST.WALK) ai.changeState(ST.WALK); // 修复播放卡壳
                    this.thinkTimer = 0.2;
                } else if (onGnd) {
                    ai.vel.x = 0;
                    let r = Math.random();
                    if (r < 0.35) { ai.changeState(ST.ATK1); audio[ai.type===2?'sfxSlash':'sfxSwing'](); }
                    else if (r < 0.55) { ai.changeState(ST.ATK3); audio[ai.type===2?'sfxSlash':'sfxSwing'](); }
                    else if (r < 0.7 && ai.type !== 1) { ai.changeState(ST.SKILL); }
                    else ai.changeState(ST.IDLE);
                    this.thinkTimer = 0.25;
                }
            }
        }

        // [6] 主控逻辑
        let scene, camera, renderer, vfx;
        let p1, p2, aiLogic = new AIController();
        let lastT = performance.now();
        let appState = 'MENU'; 
        let input = { x: 0, a: false, b: false, c: false, s: false };
        window.sysProjectiles =[]; window.gameHitStop = 0; window.gameCamShake = 0;

        async function init() {
            const canvasBox = document.getElementById('canvas-container');
            renderer = new THREE.WebGPURenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.2;
            canvasBox.appendChild(renderer.domElement);
            await renderer.init();

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 200);
            vfx = new VFXEngine(scene);
            buildEnvironment(scene);

            camera.position.set(0, CFG.camY, CFG.camZ); camera.lookAt(0, 3, 0);
            setupInput();
            
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
            requestAnimationFrame(mainLoop);
        }

        function setupInput() {
            document.getElementById('btn-fs').onclick = () => {
                if(!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(e=>console.log(e)); screen.orientation?.lock('landscape').catch(e=>{}); } 
                else document.exitFullscreen();
            };

            let selType = 0;
            document.querySelectorAll('.char-card').forEach(c => { c.onclick = () => { document.querySelectorAll('.char-card').forEach(x=>x.classList.remove('active')); c.classList.add('active'); selType = parseInt(c.dataset.type); }; });

            const startGameFlow = () => {
                audio.init();
                document.getElementById('start-screen').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; document.getElementById('ui-layer').style.display = 'block';
                document.getElementById('p1-name').innerText =["BRAWLER", "BOXER", "RONIN"][selType];
                
                if(p1) scene.remove(p1.root); if(p2) scene.remove(p2.root);
                window.sysProjectiles.forEach(p=>{ scene.remove(p.m); p.mat.dispose(); }); window.sysProjectiles =[];
                
                p1 = new Character(true, selType); scene.add(p1.root);
                p2 = new Character(false, Math.floor(Math.random()*3)); scene.add(p2.root);
                appState = 'PLAY'; updateHUD();
            };
            document.getElementById('start-btn').onclick = startGameFlow;

            // 完美的重新选角逻辑闭环
            document.getElementById('restart-btn').onclick = () => {
                appState = 'MENU';
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('start-screen').style.display = 'flex';
            };

            const bindBtn = (id, key) => {
                const el = document.getElementById(id);
                const press = (e) => { e.preventDefault(); input[key] = true; };
                const release = (e) => { e.preventDefault(); input[key] = false; };
                el.addEventListener('touchstart', press, {passive:false}); el.addEventListener('touchend', release, {passive:false});
                el.addEventListener('mousedown', press); el.addEventListener('mouseup', release); el.addEventListener('contextmenu', e=>e.preventDefault());
            };
            bindBtn('btn-a', 'a'); bindBtn('btn-b', 'b'); bindBtn('btn-c', 'c'); bindBtn('btn-s', 's');

            const zone = document.getElementById('joystick-zone'), knob = document.getElementById('joystick-knob');
            let jAct = false;
            const updateJoy = (cx) => { let rect = zone.getBoundingClientRect(); let dx = cx - (rect.left+rect.width/2); dx = Math.max(-50, Math.min(50, dx)); knob.style.transform = `translate(${dx}px, 0)`; input.x = dx > 15 ? 1 : (dx < -15 ? -1 : 0); };
            zone.addEventListener('touchstart', e=>{e.preventDefault(); jAct=true; updateJoy(e.touches[0].clientX);}, {passive:false});
            zone.addEventListener('touchmove', e=>{e.preventDefault(); if(jAct) updateJoy(e.touches[0].clientX);}, {passive:false});
            zone.addEventListener('touchend', e=>{e.preventDefault(); jAct=false; knob.style.transform='translate(0,0)'; input.x=0;}, {passive:false});
            
            window.addEventListener('keydown', e => { if(e.code==='ArrowLeft'||e.code==='KeyA') input.x = -1; if(e.code==='ArrowRight'||e.code==='KeyD') input.x = 1; if(e.code==='KeyJ') input.a=true; if(e.code==='KeyK') input.b=true; if(e.code==='KeyL') input.c=true; if(e.code==='KeyI') input.s=true; });
            window.addEventListener('keyup', e => { if(['ArrowLeft','KeyA','ArrowRight','KeyD'].includes(e.code)) input.x = 0; if(e.code==='KeyJ') input.a=false; if(e.code==='KeyK') input.b=false; if(e.code==='KeyL') input.c=false; if(e.code==='KeyI') input.s=false; });
        }

        function updateHUD() {
            if(!p1 || !p2) return;
            document.getElementById('hp-player').style.width = `${Math.max(0, p1.hp)}%`; document.getElementById('hp-enemy').style.width = `${Math.max(0, p2.hp)}%`;
            if(appState === 'PLAY' && (p1.hp <= 0 || p2.hp <= 0)) {
                appState = 'OVER';
                setTimeout(() => { document.getElementById('overlay').style.display = 'flex'; document.getElementById('overlay-txt').innerText = p1.hp > 0 ? "YOU WIN!" : "K.O."; audio.sfxKO(); }, 1500);
            }
        }

        function processPlayerLogic() {
            if(!p1 || appState !== 'PLAY' || p1.state === ST.DEAD) return;
            let onGnd = p1.pos.y <= CFG.floorY;

            if([ST.IDLE, ST.WALK, ST.JUMP, ST.FALL].includes(p1.state)) {
                if(input.x !== 0) {
                    if(onGnd && input.x !== p1.face &&[ST.ATK1, ST.ATK2, ST.ATK3, ST.SKILL].includes(p2.state)) {
                        if(p1.state !== ST.BLOCK) p1.changeState(ST.BLOCK);
                    } else {
                        p1.vel.x = input.x * p1.stats.spd; p1.face = input.x;
                        if(onGnd && p1.state !== ST.WALK) p1.changeState(ST.WALK); // 完美防抖动逻辑
                    }
                } else if(onGnd && p1.state === ST.WALK) p1.changeState(ST.IDLE);

                if(input.b && onGnd) { p1.vel.y = p1.stats.jmp; p1.changeState(ST.JUMP); audio.play(400,'sine',0.3,0.2,800); input.b=false; }
                if(input.c && onGnd) { p1.changeState(ST.DASH); audio.sfxDash(); input.c=false; }
                if(input.s && onGnd) { p1.changeState(ST.SKILL); input.s=false; }
                
                if(input.a && onGnd) { p1.changeState(p1.combo===0 ? ST.ATK1 : (p1.combo===1 ? ST.ATK2 : ST.ATK3)); audio[p1.type===2?'sfxSlash':'sfxSwing'](); input.a=false; }
            } else if (p1.state === ST.BLOCK) {
                if(input.x === p1.face || input.x === 0 || !onGnd) p1.changeState(ST.IDLE);
            }
        }

        function mainLoop(time) {
            requestAnimationFrame(mainLoop);
            let dt = (time - lastT) / 1000; lastT = time; if(dt > 0.1) dt = 0.1; 

            if(window.gameHitStop > 0) {
                window.gameHitStop -= dt; 
            } else {
                if(appState === 'PLAY') {
                    processPlayerLogic(); aiLogic.update(dt, p2, p1); p1.update(dt, p2, vfx, scene); p2.update(dt, p1, vfx, scene); updateHUD();
                }

                for(let i = window.sysProjectiles.length-1; i>=0; i--) {
                    let pr = window.sysProjectiles[i];
                    pr.m.position.x += pr.vx * dt; pr.m.rotation.y += dt*15; pr.life -= dt;
                    if(appState === 'PLAY') {
                        let opp = pr.owner === p1 ? p2 : p1;
                        if(new THREE.Box3().setFromObject(pr.m).intersectsBox(opp.getHurtBox()) && opp.state !== ST.DEAD) { opp.takeDamage(20, Math.sign(pr.vx), true, vfx); vfx.spawnSparks(pr.m.position, 0x00ffff, 20); pr.life = 0; }
                    }
                    if(pr.life <= 0) { scene.remove(pr.m); pr.mat.dispose(); window.sysProjectiles.splice(i,1); }
                }
            }

            vfx.update(dt);

            if(p1 && p2 && appState === 'PLAY') {
                let midX = Math.max(-8, Math.min(8, (p1.pos.x + p2.pos.x) / 2)); 
                camera.position.x = THREE.MathUtils.lerp(camera.position.x, midX, 0.1);
                if(window.gameCamShake > 0) { camera.position.x += (Math.random()-0.5)*window.gameCamShake*2; camera.position.y = CFG.camY + (Math.random()-0.5)*window.gameCamShake*2; window.gameCamShake -= dt; } else camera.position.y = CFG.camY;
                camera.position.z = CFG.camZ; camera.lookAt(camera.position.x, 3, 0); 
            } else {
                camera.position.x = Math.sin(time*0.0005)*8; camera.lookAt(0, 3, 0);
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
