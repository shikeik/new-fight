<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebGPU Ultimate Fighter: Neon Core</title>
    <style>
        /* ================= UI 样式系统 ================= */
        :root { --c-neon: #00ffff; --c-pink: #ff00ff; --c-bg: #050510; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--c-bg); overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; font-family: 'Arial Black', Impact, sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* 顶部控制栏 */
        .top-bar { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; z-index: 100; pointer-events: none; }
        #btn-fs { pointer-events: auto; background: rgba(0, 255, 255, 0.1); border: 1px solid var(--c-neon); color: var(--c-neon); padding: 8px 25px; border-radius: 20px; font-size: 12px; cursor: pointer; text-shadow: 0 0 5px var(--c-neon); backdrop-filter: blur(4px); transition: 0.3s; }
        #btn-fs:hover { background: var(--c-neon); color: #000; }

        /* 选人主界面 */
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(20,0,30,0.8) 0%, rgba(5,5,10,0.95) 100%); z-index: 50; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .logo { font-size: 50px; font-style: italic; color: #fff; text-shadow: 0 0 10px var(--c-pink), 4px 4px 0px #505; margin-bottom: 40px; letter-spacing: 5px; animation: glitch 2s infinite; }
        .roster { display: flex; gap: 20px; margin-bottom: 40px; }
        .char-card { width: 120px; padding: 20px 10px; background: rgba(255,255,255,0.05); border: 2px solid #333; text-align: center; color: #888; border-radius: 10px; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); position: relative; overflow: hidden; }
        .char-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent); transform: rotate(45deg); display: none; }
        .char-card.active { border-color: var(--c-neon); color: #fff; box-shadow: 0 0 20px rgba(0,255,255,0.4), inset 0 0 15px rgba(0,255,255,0.2); transform: translateY(-10px); }
        .char-card.active::before { display: block; animation: shine 2s infinite; }
        .char-icon { width: 60px; height: 60px; margin: 0 auto 15px; border-radius: 5px; border: 2px solid #555; }
        .char-stats { font-size: 10px; text-align: left; margin-top: 10px; display: none; }
        .char-card.active .char-stats { display: block; color: var(--c-neon); }
        .btn-start { padding: 15px 50px; font-size: 24px; color: #000; background: var(--c-neon); border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-weight: 900; box-shadow: 0 0 15px var(--c-neon); transition: 0.2s; }
        .btn-start:active { transform: scale(0.95); }

        @keyframes shine { 0% { left: -100%; } 100% { left: 100%; } }
        @keyframes glitch { 0% { text-shadow: 2px 0 var(--c-neon), -2px 0 var(--c-pink); } 50% { text-shadow: -2px 0 var(--c-neon), 2px 0 var(--c-pink); } 100% { text-shadow: 2px 0 var(--c-neon), -2px 0 var(--c-pink); } }

        /* 战斗 HUD */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        .hud { display: flex; justify-content: space-between; padding: 20px 40px; width: 100%; box-sizing: border-box; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .player-info { width: 42%; }
        .p-name { color: #fff; font-size: 20px; text-shadow: 2px 2px 0 #000, 0 0 5px var(--c-neon); margin-bottom: 5px; font-style: italic; }
        .enemy-info .p-name { text-align: right; text-shadow: 2px 2px 0 #000, 0 0 5px var(--c-pink); }
        .hp-bar { width: 100%; height: 28px; background: rgba(20,20,20,0.8); border: 2px solid #fff; transform: skewX(-20deg); box-shadow: 5px 5px 0 rgba(0,0,0,0.5); position: relative; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #0f0, #dfd); width: 100%; transition: width 0.15s ease-out; }
        .enemy-info .hp-fill { background: linear-gradient(90deg, #f00, #f88); float: right; }
        .combo-counter { position: absolute; top: 80px; left: 40px; font-size: 40px; color: #ff0; text-shadow: 3px 3px 0 #f00; opacity: 0; transition: opacity 0.2s; }

        /* 高级触控映射区 */
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 140px; height: 140px; background: radial-gradient(circle, rgba(0,255,255,0.2) 0%, transparent 70%); border: 2px solid rgba(0,255,255,0.3); border-radius: 50%; pointer-events: auto; }
        #joystick-knob { position: absolute; top: 45px; left: 45px; width: 50px; height: 50px; background: rgba(255,255,255,0.8); border-radius: 50%; box-shadow: 0 0 10px var(--c-neon); pointer-events: none; }
        .btn-group { position: absolute; bottom: 30px; right: 40px; width: 200px; height: 200px; pointer-events: auto; }
        .btn-act { position: absolute; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: #fff; text-shadow: 1px 1px 0 #000; box-shadow: inset 0 0 15px rgba(255,255,255,0.5), 0 5px 10px rgba(0,0,0,0.5); border: 2px solid #fff; }
        .btn-act:active { transform: translateY(5px); box-shadow: inset 0 0 20px rgba(255,255,255,0.8); }
        #btn-a { bottom: 0; left: 0; background: var(--c-pink); } /* 攻击 */
        #btn-b { bottom: 85px; left: 85px; background: #aaa; } /* 跳跃 */
        #btn-c { bottom: 0; left: 120px; background: #0f0; } /* 闪避 */
        #btn-s { bottom: 120px; left: 0; background: var(--c-neon); color: #000; text-shadow: none; } /* 技能 */

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 200; pointer-events: auto; }
        .overlay-msg { font-size: 70px; color: #ff0; text-shadow: 5px 5px 0 #f00; letter-spacing: 5px; transform: scale(0); animation: stamp 0.5s forwards; margin-bottom: 20px; }
        @keyframes stamp { to { transform: scale(1); } }
    </style>
    <!-- 使用最新的 Three.js 核心及 WebGPU 支持 -->
    <script type="importmap"> { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.webgpu.js" } } </script>
</head>
<body>
    <div class="top-bar"><button id="btn-fs">[ ] TOGGLE FULLSCREEN</button></div>
    <div id="canvas-container"></div>

    <div id="start-screen">
        <div class="logo">NEON CORE: FIGHTER</div>
        <div class="roster">
            <div class="char-card active" data-type="0">
                <div class="char-icon" style="background: linear-gradient(135deg, #00f, #fff);"></div>
                <h3>BRAWLER</h3>
                <div class="char-stats">SPD: ★★★☆☆<br>ATK: ★★★☆☆<br>RNG: ★★☆☆☆<br><br>Balanced Fighter</div>
            </div>
            <div class="char-card" data-type="1">
                <div class="char-icon" style="background: linear-gradient(135deg, #f00, #222);"></div>
                <h3>HEAVY BOXER</h3>
                <div class="char-stats">SPD: ★★☆☆☆<br>ATK: ★★★★★<br>RNG: ★☆☆☆☆<br><br>Close Combat</div>
            </div>
            <div class="char-card" data-type="2">
                <div class="char-icon" style="background: linear-gradient(135deg, #555, #0ff);"></div>
                <h3>CYBER RONIN</h3>
                <div class="char-stats">SPD: ★★★★☆<br>ATK: ★★★☆☆<br>RNG: ★★★★★<br><br>Sword Master</div>
            </div>
        </div>
        <button class="btn-start" id="start-btn">ENGAGE</button>
    </div>

    <div id="ui-layer">
        <div class="hud">
            <div class="player-info">
                <div class="p-name">P1 <span id="p1-name"></span></div>
                <div class="hp-bar"><div id="hp-player" class="hp-fill"></div></div>
            </div>
            <div class="player-info enemy-info">
                <div class="p-name">AI ENEMY</div>
                <div class="hp-bar"><div id="hp-enemy" class="hp-fill"></div></div>
            </div>
        </div>
        <div id="combo-txt" class="combo-counter">2 HITS!</div>
        
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        <div class="btn-group">
            <div id="btn-a" class="btn-act">ATK</div>
            <div id="btn-b" class="btn-act">JMP</div>

        </div>
    </div>

    <div id="overlay">
        <div id="overlay-txt" class="overlay-msg">KO!</div>
        <button class="btn-start" id="restart-btn" style="font-size:20px; padding:10px 30px;">REMATCH</button>
    </div>

    <script type="module">
        // ============================================================================
        // 游戏引擎核心架构 - 工业级单文件实现
        // 包含：环境生成器、音频合成器、动画状态机、物理/碰撞检测、AI行为树
        // ============================================================================
        import * as THREE from 'three';

        // 全局引擎配置
        const CFG = { 
            g: -50,         // 物理重力
            floorY: 0,      // 地面 Y 轴
            camZ: 28,       // 相机视距
            camY: 5.5       // 相机高度 (解决俯视 Bug 的核心)
        };
        const ST = { IDLE:0, WALK:1, JUMP:2, FALL:3, ATK1:4, ATK2:5, ATK3:6, DASH:7, SKILL:8, BLOCK:9, HURT:10, DEAD:11, WIN:12 };

        // ============================================================================
        // [1] 高级音频合成系统 (Procedural Synth Audio)
        // ============================================================================
        class AudioEngine {
            constructor() { this.ctx = null; this.master = null; this.bgmOsc = []; }
            init() {
                if (this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.master = this.ctx.createGain();
                this.master.gain.value = 0.5;
                this.master.connect(this.ctx.destination);
                this.startBGM(); // 启动动感合成器鼓点
            }
            play(freq, type, dur, vol, slide=null, noise=false) {
                if(!this.ctx) return;
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.type = type; osc.connect(gain); gain.connect(this.master);
                osc.frequency.setValueAtTime(freq, t);
                if(slide) osc.frequency.exponentialRampToValueAtTime(slide, t + dur);
                gain.gain.setValueAtTime(vol, t); gain.gain.exponentialRampToValueAtTime(0.01, t + dur);
                osc.start(t); osc.stop(t + dur);
            }
            // 具体音效映射
            sfxHitLight() { this.play(200, 'square', 0.1, 0.4, 50); }
            sfxHitHeavy() { this.play(150, 'sawtooth', 0.2, 0.6, 20); }
            sfxBlock() { this.play(600, 'sine', 0.1, 0.3, 1000); }
            sfxSwing() { this.play(150, 'sine', 0.15, 0.3, 50); }
            sfxSlash() { this.play(800, 'sawtooth', 0.1, 0.2, 200); }
            sfxDash() { this.play(100, 'sawtooth', 0.2, 0.2, 20); }
            sfxShoot() { this.play(800, 'square', 0.3, 0.3, 100); }
            sfxKO() { this.play(100, 'sawtooth', 2.0, 0.8, 10); }
            
            // 纯代码生成的赛博朋克风鼓点 Loop
            startBGM() {
                let tempo = 120; let beat = 60/tempo; let nextBeat = this.ctx.currentTime;
                const tick = () => {
                    while(nextBeat < this.ctx.currentTime + 0.1) {
                        let step = Math.round(nextBeat / beat) % 4;
                        if(step === 0 || step === 2) this.play(50, 'sine', 0.2, 0.4, 10); // Kick
                        if(step === 1 || step === 3) this.play(200, 'square', 0.1, 0.1, 10); // Snare
                        nextBeat += beat;
                    }
                    if(this.ctx) requestAnimationFrame(tick);
                };
                tick();
            }
        }
        const audio = new AudioEngine();

        // ============================================================================
        // [2] 粒子与特效引擎 (VFX Manager)
        // ============================================================================
        class VFXEngine {
            constructor(scene) {
                this.scene = scene;
                this.particles = []; this.texts = []; this.trails = [];
                this.fontCanvas = document.createElement('canvas'); // 用于浮动伤害文字
                this.fontCtx = this.fontCanvas.getContext('2d');
            }
            // 物理爆裂火花
            spawnSparks(pos, color, count=15) {
                const geom = new THREE.BoxGeometry(0.3, 0.3, 0.3);
                const mat = new THREE.MeshBasicMaterial({ color: color });
                for(let i=0; i<count; i++) {
                    const m = new THREE.Mesh(geom, mat); m.position.copy(pos);
                    this.scene.add(m);
                    this.particles.push({ m, life: 1.0, vx:(Math.random()-0.5)*30, vy:Math.random()*20+5, vz:(Math.random()-0.5)*30 });
                }
            }
            // 刀光轨迹残影
            spawnTrail(mesh, color) {
                const clone = mesh.clone();
                const worldPos = new THREE.Vector3(); mesh.getWorldPosition(worldPos);
                const worldQuat = new THREE.Quaternion(); mesh.getWorldQuaternion(worldQuat);
                clone.position.copy(worldPos); clone.quaternion.copy(worldQuat);
                clone.material = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
                this.scene.add(clone);
                this.trails.push({ m: clone, life: 0.2 }); // 0.2秒消散
            }
            // 3D 浮动伤害跳字 (用 Canvas 画字生成材质)
            spawnText(pos, txt, color="#ff0000", isCrit=false) {
                this.fontCanvas.width = 256; this.fontCanvas.height = 128;
                this.fontCtx.clearRect(0,0,256,128);
                this.fontCtx.fillStyle = color; this.fontCtx.font = `900 ${isCrit?50:40}px Impact`;
                this.fontCtx.textAlign = "center"; this.fontCtx.shadowColor = "#fff"; this.fontCtx.shadowBlur = 5;
                this.fontCtx.fillText(txt, 128, 80);
                const tex = new THREE.CanvasTexture(this.fontCanvas);
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
                sprite.position.copy(pos); sprite.position.y += 2;
                sprite.scale.set(4, 2, 1);
                this.scene.add(sprite);
                this.texts.push({ m: sprite, life: 1.0, vy: 5 });
            }
            update(dt) {
                for (let i = this.particles.length-1; i>=0; i--) {
                    let p = this.particles[i]; p.life -= dt * 2.5;
                    if(p.life <= 0){ this.scene.remove(p.m); this.particles.splice(i,1); }
                    else { p.vy += CFG.g * dt; p.m.position.x+=p.vx*dt; p.m.position.y+=p.vy*dt; p.m.position.z+=p.vz*dt; p.m.scale.setScalar(p.life); }
                }
                for (let i = this.texts.length-1; i>=0; i--) {
                    let t = this.texts[i]; t.life -= dt;
                    if(t.life <= 0){ this.scene.remove(t.m); t.m.material.map.dispose(); t.m.material.dispose(); this.texts.splice(i,1); }
                    else { t.m.position.y += t.vy * dt; t.m.material.opacity = t.life; }
                }
                for (let i = this.trails.length-1; i>=0; i--) {
                    let t = this.trails[i]; t.life -= dt;
                    if(t.life <= 0){ this.scene.remove(t.m); t.m.material.dispose(); this.trails.splice(i,1); }
                    else { t.m.material.opacity = (t.life / 0.2) * 0.5; t.m.scale.multiplyScalar(0.9); }
                }
            }
        }

        // ============================================================================
        // [3] 程序化场景生成器 (Synthwave Procedural Environment)
        // ============================================================================
        function buildEnvironment(scene) {
            // 修复 Bug：深空色背景避免穿透黑屏
            scene.background = new THREE.Color(0x0a0515);
            scene.fog = new THREE.FogExp2(0x0a0515, 0.015);

            // 1. 光照
            const sunLight = new THREE.DirectionalLight(0xff00aa, 2); sunLight.position.set(-20, 20, -10); scene.add(sunLight);
            const rimLight = new THREE.DirectionalLight(0x00ffff, 3); rimLight.position.set(20, 10, 10); scene.add(rimLight);
            scene.add(new THREE.AmbientLight(0x221144, 2));

            // 2. 发光物理网格地面
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(120, 50), new THREE.MeshStandardMaterial({ color: 0x050510, roughness: 0.1, metalness: 0.9 }));
            floor.rotation.x = -Math.PI/2; scene.add(floor);
            const grid = new THREE.GridHelper(120, 40, 0xff00ff, 0x0088ff); grid.position.y = 0.02; scene.add(grid);

            // 3. 程序化远山 (Vertex Manipulation)
            const mtnGeom = new THREE.PlaneGeometry(200, 50, 64, 16);
            const pos = mtnGeom.attributes.position;
            for(let i=0; i<pos.count; i++) {
                const px = pos.getX(i), py = pos.getY(i);
                // 复合正弦波生成山脉起伏
                let z = Math.abs(Math.sin(px * 0.05) * 10) + Math.cos(px * 0.1)*5;
                if(py > 0) z = 0; // 底边缘平齐
                pos.setZ(i, z * (py/25)); // 越界高度越高
            }
            mtnGeom.computeVertexNormals();
            const mountains = new THREE.Mesh(mtnGeom, new THREE.MeshBasicMaterial({ color: 0xaa00ff, wireframe: true, transparent: true, opacity: 0.3 }));
            mountains.rotation.x = -Math.PI/2; mountains.position.set(0, 0, -30); scene.add(mountains);

            // 4. 霓虹夕阳 (Canvas Texture)
            const scCanvas = document.createElement('canvas'); scCanvas.width=512; scCanvas.height=512;
            const scCtx = scCanvas.getContext('2d');
            let grad = scCtx.createLinearGradient(0,0,0,512); grad.addColorStop(0,"#ffaa00"); grad.addColorStop(1,"#ff00ff");
            scCtx.fillStyle = grad; scCtx.beginPath(); scCtx.arc(256,256,250,0,Math.PI*2); scCtx.fill();
            // 切割横条纹
            scCtx.globalCompositeOperation = 'destination-out';
            for(let i=0; i<10; i++) scCtx.fillRect(0, 300 + i*25, 512, 5 + i*1.5);
            const sunTex = new THREE.CanvasTexture(scCanvas);
            const sunBg = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), new THREE.MeshBasicMaterial({ map: sunTex, transparent: true, fog: false }));
            sunBg.position.set(0, 30, -50); scene.add(sunBg);

            // 5. 赛博城市天际线 (Instanced Boxes)
            const buildGeom = new THREE.BoxGeometry(1,1,1);
            const buildMat = new THREE.MeshLambertMaterial({ color: 0x111122, emissive: 0x00ffff, emissiveIntensity: 0.1 });
            const city = new THREE.InstancedMesh(buildGeom, buildMat, 60);
            const mat4 = new THREE.Matrix4();
            for(let i=0; i<60; i++) {
                let w = 2 + Math.random()*4, h = 10 + Math.random()*25, d = 2 + Math.random()*4;
                let x = (Math.random()-0.5)*120, z = -15 - Math.random()*15;
                mat4.makeTranslation(x, h/2, z); mat4.scale(new THREE.Vector3(w,h,d));
                city.setMatrixAt(i, mat4);
            }
            scene.add(city);
        }

        // ============================================================================
        // [4] 骨骼驱动与实体基类 (Core Voxel Character System)
        // ============================================================================
        class Character {
            constructor(isPlayer, typeID) {
                this.isP = isPlayer; this.type = typeID;
                this.hp = 100; this.maxHp = 100;
                this.pos = new THREE.Vector3(isPlayer ? -5 : 5, CFG.floorY, 0);
                this.vel = new THREE.Vector3(0,0,0);
                this.face = isPlayer ? 1 : -1;
                this.state = ST.IDLE; this.stTimer = 0;
                
                // 战斗核心状态
                this.combo = 0; this.comboTimer = 0;
                this.hitConnected = false; this.isInvincible = false;
                this.hitboxes = []; // 攻击判定框数组 { localPos, radius, active }
                
                // 职业属性加载 (0:Brawler, 1:Boxer, 2:Ronin)
                this.stats = {
                    spd: [14, 11, 16][typeID], 
                    jmp: [20, 16, 22][typeID],
                    atkRanges: [[1.5,1.5], [1.2, 1.2], [2.8, 3.5]][typeID], // [轻击距, 重击距]
                    dmgMuls: [1.0, 1.5, 1.2][typeID]
                };

                this._buildRig();
            }

            // 程序化构建层级关节 (Hierarchical Kinematics)
            _buildRig() {
                this.root = new THREE.Group();
                const skinMat = new THREE.MeshLambertMaterial({ color: 0xffccaa });
                
                const makeNode = (p) => { const g = new THREE.Group(); g.position.copy(p); return g; };
                const makeBox = (p, w,h,d, col, offY=0) => { 
                    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshLambertMaterial({color:col})); 
                    m.position.set(0, offY, 0); m.castShadow = m.receiveShadow = true; p.add(m); return m; 
                };

                this.body = makeNode(new THREE.Vector3(0, 1.5, 0)); this.root.add(this.body);
                this.head = makeNode(new THREE.Vector3(0, 0.8, 0)); this.body.add(this.head);
                makeBox(this.head, 0.6,0.6,0.6, skinMat.color, 0.3);

                // 关节锚点
                this.armL = makeNode(new THREE.Vector3(-0.7, 0.6, 0)); this.body.add(this.armL);
                this.armR = makeNode(new THREE.Vector3(0.7, 0.6, 0)); this.body.add(this.armR);
                this.legL = makeNode(new THREE.Vector3(-0.3, -0.7, 0)); this.body.add(this.legL);
                this.legR = makeNode(new THREE.Vector3(0.3, -0.7, 0)); this.body.add(this.legR);

                // 根据职业定制外观与武器
                if(this.type === 0) { // 斗士
                    makeBox(this.body, 1.0, 1.4, 0.6, 0x0055ff); // 蓝衣
                    makeBox(this.head, 0.65, 0.1, 0.65, 0xffffff, 0.5); // 头带
                    makeBox(this.armL, 0.35, 1.1, 0.35, skinMat.color, -0.5);
                    makeBox(this.armR, 0.35, 1.1, 0.35, skinMat.color, -0.5);
                    makeBox(this.legL, 0.4, 1.2, 0.4, 0x333333, -0.6);
                    makeBox(this.legR, 0.4, 1.2, 0.4, 0x333333, -0.6);
                } else if(this.type === 1) { // 拳击手 (更壮，大红拳套)
                    makeBox(this.body, 1.2, 1.3, 0.7, skinMat.color);
                    makeBox(this.body, 1.25, 0.4, 0.75, 0x111111, -0.5); // 裤子
                    makeBox(this.armL, 0.4, 0.8, 0.4, skinMat.color, -0.4);
                    makeBox(this.armR, 0.4, 0.8, 0.4, skinMat.color, -0.4);
                    makeBox(this.armL, 0.6, 0.6, 0.6, 0xff0000, -1.0); // 拳套
                    makeBox(this.armR, 0.6, 0.6, 0.6, 0xff0000, -1.0);
                } else { // 浪人 (灰甲，斗笠，太刀)
                    makeBox(this.body, 0.9, 1.4, 0.5, 0x556677);
                    makeBox(this.head, 1.4, 0.1, 1.4, 0x998866, 0.6); // 斗笠
                    makeBox(this.armL, 0.3, 1.1, 0.3, 0x334455, -0.5);
                    makeBox(this.armR, 0.3, 1.1, 0.3, 0x334455, -0.5);
                    makeBox(this.legL, 0.4, 1.1, 0.4, 0x222222, -0.5);
                    makeBox(this.legR, 0.4, 1.1, 0.4, 0x222222, -0.5);
                    this.weapon = makeBox(this.armR, 0.1, 2.5, 0.2, 0x00ffff, -1.5); // 激光太刀
                    this.weapon.rotation.x = Math.PI/4;
                }

                // 获取所有材质引用用于受击闪白
                this.mats = []; this.root.traverse(c => { if(c.isMesh) this.mats.push(c.material); });
            }

            changeState(st) {
                if([ST.DEAD, ST.WIN].includes(this.state)) return;
                this.state = st; this.stTimer = 0; this.hitConnected = false; this.isInvincible = false;
                // 复位骨骼
                this.body.rotation.set(0,0,0); this.head.rotation.set(0,0,0);
                this.armL.rotation.set(0,0,0); this.armR.rotation.set(0,0,0);
                this.legL.rotation.set(0,0,0); this.legR.rotation.set(0,0,0);
                this.mats.forEach(m => { m.opacity=1; m.transparent=false; });

                if(st === ST.DASH) { this.isInvincible = true; this.vel.x = this.face * CFG.dodgeSpeed; this.vel.y = 0; this.mats.forEach(m=>{m.opacity=0.4; m.transparent=true;}); }
                if(st === ST.BLOCK) { this.vel.x = 0; }
                if(st === ST.SKILL) { this.vel.x = 0; }
            }

            takeDamage(dmg, dirX, isHeavy, vfx) {
                if(this.isInvincible || this.state === ST.DEAD) return false;
                
                // 防御判定：如果在BLOCK状态且方向正确
                if(this.state === ST.BLOCK && dirX !== this.face) {
                    this.hp -= dmg * 0.1; // 仅受 10% 芯片伤害
                    vfx.spawnSparks(new THREE.Vector3(this.pos.x + this.face, this.pos.y+1.5, 0), 0x00ffff, 5);
                    audio.sfxBlock();
                    this.vel.x = dirX * 3; // 轻微后退
                    return true;
                }

                this.hp -= dmg;
                audio[isHeavy?'sfxHitHeavy':'sfxHitLight']();
                vfx.spawnSparks(new THREE.Vector3(this.pos.x, this.pos.y+1.5, 0), isHeavy?0xff00ff:0xffaa00);
                vfx.spawnText(new THREE.Vector3(this.pos.x, this.pos.y+2, 0), Math.floor(dmg), isHeavy?"#ff00ff":"#ffaa00", isHeavy);

                // 打击反馈核心
                this.vel.x = dirX * (isHeavy ? 15 : 6);
                this.vel.y = isHeavy ? 10 : 2;
                this.mats.forEach(m => m.emissive.setHex(0xffffff));
                setTimeout(() => { if(this.mats) this.mats.forEach(m => m.emissive.setHex(0x000000)); }, 80);

                if(this.hp <= 0) { this.hp = 0; this.changeState(ST.DEAD); } 
                else this.changeState(ST.HURT);
                return true;
            }

            // 核心动画状态机与判定引擎
            update(dt, opp, vfx, scene) {
                if(this.state === ST.DEAD || this.state === ST.WIN) { this._animate(dt, vfx); this.root.position.copy(this.pos); return; }

                this.stTimer += dt;
                if(this.comboTimer > 0) this.comboTimer -= dt; else this.combo = 0;
                let onGnd = this.pos.y <= CFG.floorY;

                // 物理更新
                if(!onGnd) this.vel.y += CFG.g * dt;
                else if(this.vel.y < 0) { 
                    this.vel.y = 0; this.pos.y = CFG.floorY; 
                    if([ST.FALL, ST.HURT].includes(this.state)) this.changeState(ST.IDLE); 
                }
                if(onGnd && ![ST.WALK, ST.DASH].includes(this.state)) this.vel.x *= 0.6; // 地面摩擦

                // 攻击判定发生器 (Attack Box)
                if([ST.ATK1, ST.ATK2, ST.ATK3].includes(this.state) && !this.hitConnected) {
                    let isHeavy = this.state === ST.ATK3;
                    let activeStart = isHeavy ? 0.2 : 0.1;
                    let activeEnd = isHeavy ? 0.35 : 0.2;
                    let atkRange = this.stats.atkRanges[isHeavy?1:0];

                    if(onGnd && this.stTimer < 0.1) this.vel.x = this.face * (isHeavy?8:4); // 攻击步伐微调

                    if(this.stTimer >= activeStart && this.stTimer <= activeEnd) {
                        if(this.type === 2) vfx.spawnTrail(this.weapon, 0x00ffff); // 浪人刀光
                        let hitX = this.pos.x + this.face * atkRange;
                        if(Math.abs(hitX - opp.pos.x) < 1.5 && Math.abs(this.pos.y - opp.pos.y) < 2.5) {
                            let dmg = (isHeavy?15:8) * this.stats.dmgMuls;
                            let hitSuccess = opp.takeDamage(dmg, this.face, isHeavy, vfx);
                            if(hitSuccess) {
                                this.hitConnected = true;
                                if(this.isP) { // 玩家连击提示
                                    this.combo++; this.comboTimer = 2.0;
                                    let cTxt = document.getElementById('combo-txt');
                                    if(this.combo > 1) { cTxt.innerText = `${this.combo} HITS!`; cTxt.style.opacity = 1; setTimeout(()=>cTxt.style.opacity=0, 1500); }
                                }
                                window.gameHitStop = isHeavy ? 0.15 : 0.08; // 触发全局顿帧
                                window.gameCamShake = isHeavy ? 0.8 : 0.3;
                            }
                        }
                    }
                    if(this.stTimer > (isHeavy?0.6:0.35)) this.changeState(ST.IDLE);
                }

                // 动作恢复
                if(this.state === ST.DASH && this.stTimer > 0.3) this.changeState(ST.IDLE);
                if(this.state === ST.HURT && this.stTimer > 0.4 && onGnd) this.changeState(ST.IDLE);

                // 技能：发波
                if(this.state === ST.SKILL) {
                    if(this.stTimer > 0.2 && !this.hitConnected) {
                        this.hitConnected = true; audio.sfxShoot();
                        const geom = new THREE.SphereGeometry(0.8, 8, 8);
                        const mat = new THREE.MeshBasicMaterial({ color: this.type===1?0xff0000:0x00ffff, wireframe: true });
                        const proj = new THREE.Mesh(geom, mat);
                        proj.position.set(this.pos.x + this.face*2, this.pos.y + 1.2, 0);
                        scene.add(proj);
                        window.sysProjectiles.push({ m: proj, vx: this.face * 35, owner: this, life: 1.5 });
                    }
                    if(this.stTimer > 0.6) this.changeState(ST.IDLE);
                }

                // 位置更新防越界与穿模
                this.pos.addScaledVector(this.vel, dt);
                this.pos.x = Math.max(-18, Math.min(18, this.pos.x));
                if(opp.state !== ST.DEAD && this.state !== ST.DODGE && opp.state !== ST.DODGE) {
                    let d = opp.pos.x - this.pos.x;
                    if(Math.abs(d) < 1.5 && this.pos.y < opp.pos.y + 2) this.pos.x = opp.pos.x - Math.sign(d)*1.5;
                }

                this.root.position.copy(this.pos);
                this.root.rotation.y = THREE.MathUtils.lerp(this.root.rotation.y, this.face>0 ? Math.PI/2 : -Math.PI/2, 0.4);
                this._animate(dt);
            }

            // 程序化关键帧动画插值器
            _animate(dt) {
                const t = this.stTimer; const pi = Math.PI;
                switch(this.state) {
                    case ST.IDLE:
                        this.body.position.y = 1.5 + Math.sin(t*4)*0.05;
                        this.armL.rotation.x = Math.sin(t*2)*0.1; 
                        this.armR.rotation.x = this.type===2 ? -0.5 : Math.sin(t*2+pi)*0.1;
                        break;
                    case ST.WALK:
                        this.body.position.y = 1.5 + Math.abs(Math.sin(t*15))*0.1;
                        this.armL.rotation.x = Math.sin(t*15)*1.2; this.armR.rotation.x = this.type===2?-0.5:-Math.sin(t*15)*1.2;
                        this.legL.rotation.x = -Math.sin(t*15)*1.2; this.legR.rotation.x = Math.sin(t*15)*1.2;
                        break;
                    case ST.JUMP: case ST.FALL:
                        this.legL.rotation.x = -0.5; this.legR.rotation.x = 0.2;
                        this.armL.rotation.x = -0.8; this.armR.rotation.x = 0.8;
                        break;
                    case ST.ATK1: case ST.ATK2: // 轻攻击 (分左右手)
                        let isLeft = this.state === ST.ATK1;
                        let arm = isLeft ? this.armL : this.armR;
                        if(this.type === 2) { // 挥剑
                            if(t<0.1) { this.armR.rotation.x = t*25; this.body.rotation.x = 0.3; } else { this.armR.rotation.x = THREE.MathUtils.lerp(this.armR.rotation.x, 0, 0.2); this.body.rotation.x = 0; }
                        } else { // 出直拳
                            if(t<0.1) { arm.rotation.x = t*20; this.body.rotation.y = isLeft?0.5:-0.5; } else { arm.rotation.x = THREE.MathUtils.lerp(arm.rotation.x, 0, 0.3); this.body.rotation.y = 0; }
                        }
                        break;
                    case ST.ATK3: // 重攻击 (大前摇下砸)
                        if(this.type === 2) { // 大劈
                            if(t<0.2) { this.armR.rotation.x = -2; this.body.rotation.x = -0.3; } else if(t<0.3) { this.armR.rotation.x = 2.5; this.body.rotation.x = 0.5; } else { this.armR.rotation.x = THREE.MathUtils.lerp(this.armR.rotation.x, 0, 0.1); this.body.rotation.x = 0; }
                        } else { // 升龙或重拳
                            if(t<0.2) { this.armR.rotation.x = -1; this.body.position.y = 1.0; } else if(t<0.3) { this.armR.rotation.x = 3; this.body.position.y = 2.0; } else { this.armR.rotation.x = THREE.MathUtils.lerp(this.armR.rotation.x, 0, 0.1); this.body.position.y = 1.5; }
                        }
                        break;
                    case ST.BLOCK:
                        this.armL.rotation.x = -1.5; this.armR.rotation.x = -1.5;
                        this.armL.rotation.z = 0.5; this.armR.rotation.z = -0.5;
                        this.body.rotation.x = 0.2;
                        break;
                    case ST.DASH:
                        this.body.rotation.x = 0.6; this.armL.rotation.x = -1; this.armR.rotation.x = -1; this.head.rotation.x = -0.5;
                        break;
                    case ST.SKILL: // 聚气发波
                        if(t<0.2) { this.armL.rotation.x = -2.5; this.armR.rotation.x = -2.5; } else { this.armL.rotation.x = 1.5; this.armR.rotation.x = 1.5; }
                        break;
                    case ST.HURT:
                        this.body.rotation.x = -0.6; this.head.rotation.x = 0.6; this.armL.rotation.x = -0.5; this.armR.rotation.x = -0.5;
                        break;
                    case ST.DEAD:
                        this.body.rotation.x = -pi/2; this.body.position.y = 0.6; this.legL.rotation.x = 0; this.legR.rotation.x = 0;
                        break;
                    case ST.WIN:
                        this.body.rotation.x = 0; this.armL.rotation.z = 2.8; this.armR.rotation.z = -2.8; this.head.rotation.x = Math.sin(t*10)*0.1;
                        break;
                }
            }
        }

        // ============================================================================
        // [5] 顶级应用主控循环 (The Director)
        // ============================================================================
        let scene, camera, renderer, vfx;
        let p1, p2;
        let lastT = performance.now();
        let appState = 'MENU'; // MENU, PLAY, OVER
        let input = { x: 0, a: false, b: false, c: false, s: false };
        window.sysProjectiles = []; window.gameHitStop = 0; window.gameCamShake = 0;

        async function init() {
            // 渲染器核心
            const canvasBox = document.getElementById('canvas-container');
            renderer = new THREE.WebGPURenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            canvasBox.appendChild(renderer.domElement);
            await renderer.init();

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 200);
            vfx = new VFXEngine(scene);

            buildEnvironment(scene);

            // 初始空镜头展示
            camera.position.set(0, CFG.camY, CFG.camZ);
            camera.lookAt(0, 3, 0);

            setupInput();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            requestAnimationFrame(mainLoop);
        }

        function setupInput() {
            // UI 控制
            document.getElementById('btn-fs').onclick = () => {
                if(!document.fullscreenElement) { document.documentElement.requestFullscreen(); screen.orientation?.lock('landscape').catch(e=>{}); }
                else document.exitFullscreen();
            };

            let selType = 0;
            document.querySelectorAll('.char-card').forEach(c => {
                c.onclick = () => { document.querySelectorAll('.char-card').forEach(x=>x.classList.remove('active')); c.classList.add('active'); selType = parseInt(c.dataset.type); };
            });

            const startGameFlow = () => {
                audio.init();
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'block';
                document.getElementById('p1-name').innerText = ["BRAWLER", "BOXER", "RONIN"][selType];
                
                // 清理旧实体
                if(p1) scene.remove(p1.root); if(p2) scene.remove(p2.root);
                window.sysProjectiles.forEach(p=>scene.remove(p.m)); window.sysProjectiles = [];
                
                p1 = new Character(true, selType); scene.add(p1.root);
                p2 = new Character(false, Math.floor(Math.random()*3)); scene.add(p2.root);
                appState = 'PLAY';
                updateHUD();
            };
            document.getElementById('start-btn').onclick = startGameFlow;
            document.getElementById('restart-btn').onclick = startGameFlow;

            // 战斗按键逻辑 (支持触摸防粘连)
            const bindBtn = (id, key) => {
                const el = document.getElementById(id);
                const press = (e) => { e.preventDefault(); input[key] = true; };
                const release = (e) => { e.preventDefault(); input[key] = false; };
                el.addEventListener('touchstart', press, {passive:false}); el.addEventListener('touchend', release, {passive:false});
                el.addEventListener('mousedown', press); el.addEventListener('mouseup', release);
            };
            bindBtn('btn-a', 'a'); bindBtn('btn-b', 'b'); bindBtn('btn-c', 'c'); bindBtn('btn-s', 's');

            // 摇杆控制
            const zone = document.getElementById('joystick-zone'), knob = document.getElementById('joystick-knob');
            let jAct = false;
            const updateJoy = (cx) => {
                let rect = zone.getBoundingClientRect(); let dx = cx - (rect.left+rect.width/2);
                dx = Math.max(-50, Math.min(50, dx)); knob.style.transform = `translate(${dx}px, 0)`;
                input.x = dx > 15 ? 1 : (dx < -15 ? -1 : 0);
            };
            zone.addEventListener('touchstart', e=>{e.preventDefault(); jAct=true; updateJoy(e.touches[0].clientX);}, {passive:false});
            zone.addEventListener('touchmove', e=>{e.preventDefault(); if(jAct) updateJoy(e.touches[0].clientX);}, {passive:false});
            zone.addEventListener('touchend', e=>{e.preventDefault(); jAct=false; knob.style.transform='translate(0,0)'; input.x=0;}, {passive:false});
            
            // 键盘兜底
            window.addEventListener('keydown', e => {
                if(e.code==='ArrowLeft'||e.code==='KeyA') input.x = -1; if(e.code==='ArrowRight'||e.code==='KeyD') input.x = 1;
                if(e.code==='KeyJ') input.a=true; if(e.code==='KeyK') input.b=true; if(e.code==='KeyL') input.c=true; if(e.code==='KeyI') input.s=true;
            });
            window.addEventListener('keyup', e => {
                if(['ArrowLeft','KeyA','ArrowRight','KeyD'].includes(e.code)) input.x = 0;
                if(e.code==='KeyJ') input.a=false; if(e.code==='KeyK') input.b=false; if(e.code==='KeyL') input.c=false; if(e.code==='KeyI') input.s=false;
            });
        }

        function updateHUD() {
            if(!p1 || !p2) return;
            document.getElementById('hp-player').style.width = `${Math.max(0, p1.hp)}%`;
            document.getElementById('hp-enemy').style.width = `${Math.max(0, p2.hp)}%`;
            if(appState === 'PLAY' && (p1.hp <= 0 || p2.hp <= 0)) {
                appState = 'OVER';
                setTimeout(() => {
                    document.getElementById('overlay').style.display = 'flex';
                    document.getElementById('overlay-txt').innerText = p1.hp > 0 ? "YOU WIN!" : "K.O.";
                    audio.sfxKO();
                }, 1500);
            }
        }

        // --- Controller 逻辑派发 ---
        function processPlayerLogic() {
            if(!p1 || appState !== 'PLAY' || p1.state === ST.DEAD) return;
            let onGnd = p1.pos.y <= CFG.floorY;

            // 能够接受输入的闲置/移动状态
            if([ST.IDLE, ST.WALK, ST.JUMP, ST.FALL].includes(p1.state)) {
                // 摇杆移动与格挡
                if(input.x !== 0) {
                    // 后退且地面 = 防御
                    if(onGnd && input.x !== p1.face && (p2.state===ST.ATK1||p2.state===ST.ATK2||p2.state===ST.ATK3||p2.state===ST.SKILL)) {
                        p1.changeState(ST.BLOCK);
                    } else {
                        p1.vel.x = input.x * p1.stats.spd; p1.face = input.x;
                        if(onGnd) p1.changeState(ST.WALK);
                    }
                } else if(onGnd && p1.state === ST.WALK) p1.changeState(ST.IDLE);

                // 动作输入
                if(input.b && onGnd) { p1.vel.y = p1.stats.jmp; p1.changeState(ST.JUMP); audio.play(400,'sine',0.3,0.2,800); input.b=false; }
                if(input.c && onGnd) { p1.changeState(ST.DASH); audio.sfxDash(); input.c=false; }
                if(input.s && onGnd) { p1.changeState(ST.SKILL); input.s=false; }
                
                // 攻击与连招派生
                if(input.a && onGnd) { 
                    p1.changeState(p1.combo===0 ? ST.ATK1 : (p1.combo===1 ? ST.ATK2 : ST.ATK3)); 
                    audio[p1.type===2?'sfxSlash':'sfxSwing'](); input.a=false; 
                }
            } else if (p1.state === ST.BLOCK) {
                // 解除防御
                if(input.x === p1.face || input.x === 0 || !onGnd) p1.changeState(ST.IDLE);
            }
        }

        function processAILogic() {
            if(!p2 || appState !== 'PLAY' || p2.state === ST.DEAD) return;
            let onGnd = p2.pos.y <= CFG.floorY;
            if(![ST.IDLE, ST.WALK].includes(p2.state)) return;

            let d = p1.pos.x - p2.pos.x;
            p2.face = d > 0 ? 1 : -1;
            
            // AI 行为树雏形
            let dist = Math.abs(d);
            let atkRng = p2.stats.atkRanges[0];

            if(dist > atkRng * 1.5) { // 追击
                p2.vel.x = p2.face * (p2.stats.spd * 0.7);
                if(onGnd) p2.changeState(ST.WALK);
            } else if (dist < atkRng) { // 贴脸
                p2.vel.x = 0;
                if(onGnd) {
                    let r = Math.random();
                    if(r < 0.05) { p2.changeState(ST.ATK1); audio[p2.type===2?'sfxSlash':'sfxSwing'](); }
                    else if(r < 0.08) { p2.changeState(ST.ATK3); audio[p2.type===2?'sfxSlash':'sfxSwing'](); } // 重击
                    else if(p1.state >= ST.ATK1 && p1.state <= ST.SKILL && r < 0.2) p2.changeState(ST.BLOCK); // 概率格挡
                    else p2.changeState(ST.IDLE);
                }
            } else { // 游走
                p2.vel.x = 0; if(onGnd) p2.changeState(ST.IDLE);
            }
        }

        // ============================================================================
        // [6] Render Loop (渲染与物理步进)
        // ============================================================================
        function mainLoop(time) {
            requestAnimationFrame(mainLoop);
            let dt = (time - lastT) / 1000; lastT = time;
            if(dt > 0.1) dt = 0.1;

            if(window.gameHitStop > 0) {
                window.gameHitStop -= dt; // 顿帧时跳过逻辑更新
            } else {
                if(appState === 'PLAY') {
                    processPlayerLogic();
                    processAILogic();
                    p1.update(dt, p2, vfx, scene);
                    p2.update(dt, p1, vfx, scene);
                    updateHUD();
                }

                // 更新独立于 Hitstop 的飞行道具
                for(let i = window.sysProjectiles.length-1; i>=0; i--) {
                    let pr = window.sysProjectiles[i];
                    pr.m.position.x += pr.vx * dt; pr.m.rotation.y += dt*10; pr.life -= dt;
                    if(appState === 'PLAY') {
                        let opp = pr.owner === p1 ? p2 : p1;
                        if(Math.abs(pr.m.position.x - opp.pos.x)<1.5 && Math.abs(pr.m.position.y - opp.pos.y)<2.5 && opp.state !== ST.DEAD) {
                            opp.takeDamage(20, Math.sign(pr.vx), true, vfx);
                            vfx.spawnSparks(pr.m.position, 0x00ffff, 20);
                            pr.life = 0;
                        }
                    }
                    if(pr.life <= 0) { scene.remove(pr.m); window.sysProjectiles.splice(i,1); }
                }
            }

            vfx.update(dt);

            // 完美的 2D 视角平滑相机算法 (修复了俯视 BUG)
            if(p1 && p2 && appState === 'PLAY') {
                let midX = (p1.pos.x + p2.pos.x) / 2;
                midX = Math.max(-10, Math.min(10, midX)); // 限制边界
                camera.position.x = THREE.MathUtils.lerp(camera.position.x, midX, 0.1);
                
                // 震屏叠加
                if(window.gameCamShake > 0) {
                    camera.position.x += (Math.random()-0.5)*window.gameCamShake*2;
                    camera.position.y = CFG.camY + (Math.random()-0.5)*window.gameCamShake*2;
                    window.gameCamShake -= dt;
                } else camera.position.y = CFG.camY;
                
                // 严格锁定 Z 轴深度和高度
                camera.position.z = CFG.camZ;
                camera.lookAt(camera.position.x, 3, 0); 
            } else {
                // 选人界面缓慢旋转视角
                camera.position.x = Math.sin(time*0.0005)*5;
                camera.lookAt(0, 3, 0);
            }

            renderer.render(scene, camera);
        }

        // 启动引擎
        init();
    </script>
</body>
</html>
